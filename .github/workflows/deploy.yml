name: Deploy modules to Hetzner

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Sync modules to server
        run: |
          rsync -azP --delete \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ root@188.245.110.34:/opt/content-pipeline-modules-v2/

      - name: Restart app to reload modules
        run: |
          ssh -i ~/.ssh/deploy_key root@188.245.110.34 \
            "pm2 restart content-pipeline-v2 && pm2 save"
